<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetKo Pro Monitor</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .drop-alert { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { background: #e11d48; } 50% { background: #9f1239; } }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-emerald-400">BetKo <span class="text-white text-xs font-light uppercase tracking-widest">Live Pro</span></h1>
            <p id="apiStatus" class="text-[10px] text-gray-500 italic">Sistem spreman</p>
        </div>
        <button id="enableNotifications" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm transition font-bold shadow-lg shadow-emerald-900/20">
            <i class="fas fa-satellite-dish mr-2"></i>Aktiviraj Monitor
        </button>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card p-4 rounded-2xl border-l-4 border-emerald-500">
            <p class="text-gray-400 text-[10px] uppercase font-bold">Sledeći presek</p>
            <p id="nextReport" class="text-xl font-mono text-emerald-300">13:00 / 17:00</p>
        </div>
        <div class="card p-4 rounded-2xl border-l-4 border-blue-500 text-right">
            <p class="text-gray-400 text-[10px] uppercase font-bold">Aktivno mečeva</p>
            <p id="activeMatches" class="text-xl font-mono text-blue-300">0</p>
        </div>
    </div>

    <div id="matchContainer" class="space-y-4">
        <div class="flex flex-col items-center justify-center py-20 opacity-50">
            <i class="fas fa-spinner fa-spin text-3xl mb-4 text-emerald-500"></i>
            <p class="text-sm">Povezivanje sa serverima...</p>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 p-4 flex justify-around items-center z-50">
        <button onclick="refreshData()" class="bg-slate-800 p-3 rounded-full text-emerald-400 hover:scale-110 transition"><i class="fas fa-sync-alt"></i></button>
        <div class="text-[10px] text-gray-500 text-center uppercase tracking-widest font-bold">Betko dashboard v2.0<br><span id="lastUpdate" class="lowercase font-normal">nije osveženo</span></div>
        <button id="testSound" class="bg-slate-800 p-3 rounded-full text-gray-400"><i class="fas fa-volume-up"></i></button>
    </nav>

    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        // ROTACIJA KLJUČEVA
        const KEYS = ['8464fe0b2c02cc648155fd7aaa8a5806', 'f1cce1e4be71307c45a7a206e4a16495'];
        const ODDS_KEY = '78aa611b89f31e9ea7a5450ecb188205801b0be3e43a2a7ae72dc6cf6667da07';
        let currentKeyIndex = 0;

        async function fetchWithRetry(url) {
            let response = await fetch(url, {
                headers: { 'x-apisports-key': KEYS[currentKeyIndex] }
            });

            if (response.status === 429 || response.status === 403) {
                console.log("Menjam API ključ...");
                currentKeyIndex = (currentKeyIndex + 1) % KEYS.length;
                response = await fetch(url, {
                    headers: { 'x-apisports-key': KEYS[currentKeyIndex] }
                });
            }
            return response.json();
        }

        async function refreshData() {
            const container = document.getElementById('matchContainer');
            const statusText = document.getElementById('apiStatus');
            
            try {
                const data = await fetchWithRetry('https://v3.football.api-sports.io/fixtures?live=all');
                
                if (!data.response || data.response.length === 0) {
                    container.innerHTML = '<div class="text-center py-10 text-gray-500">Trenutno nema mečeva uživo ili je API limit dostignut.</div>';
                    document.getElementById('activeMatches').innerText = "0";
                    return;
                }

                renderMatches(data.response);
                document.getElementById('activeMatches').innerText = data.response.length;
                document.getElementById('lastUpdate').innerText = "osveženo u " + new Date().toLocaleTimeString();
                statusText.innerText = "Podaci ažurirani";
                statusText.className = "text-[10px] text-emerald-500 italic";

            } catch (err) {
                container.innerHTML = `<div class="p-4 bg-rose-900/20 border border-rose-500/50 rounded-xl text-rose-400 text-sm italic">Greška: ${err.message}. Proveri konzolu (F12).</div>`;
                statusText.innerText = "Greška u konekciji";
                statusText.className = "text-[10px] text-rose-500 italic";
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matchContainer');
            container.innerHTML = '';

            matches.forEach(m => {
                const home = m.teams.home.name;
                const away = m.teams.away.name;
                const goalsH = m.goals.home ?? 0;
                const goalsA = m.goals.away ?? 0;
                const time = m.fixture.status.elapsed;

                // Simulacija provere favorita (ovo treba proširiti pravim API-jem za kvote)
                // Za sad stavljamo placeholder 1.50 radi testiranja izgleda
                const startOdd = 1.50; 
                const isFavoriteLosing = (startOdd < 1.75 && goalsH < goalsA);

                const card = document.createElement('div');
                card.className = `card p-5 rounded-2xl relative overflow-hidden transition-all ${isFavoriteLosing ? 'border-rose-500 border-2' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] bg-slate-800/80 px-2 py-1 rounded text-emerald-400 font-bold uppercase tracking-wider">${m.league.name}</span>
                        <div class="flex items-center gap-2">
                            <span class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                            </span>
                            <span class="text-emerald-400 font-mono font-bold text-sm">${time}'</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center gap-4">
                        <div class="flex-1 space-y-1">
                            <div class="flex justify-between items-center">
                                <p class="text-base font-semibold ${isFavoriteLosing ? 'text-rose-400' : 'text-white'}">${home}</p>
                                <span class="text-xl font-black">${goalsH}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <p class="text-base font-semibold">${away}</p>
                                <span class="text-xl font-black">${goalsA}</span>
                            </div>
                        </div>
                        <div class="w-px h-10 bg-slate-700"></div>
                        <div class="text-right min-w-[50px]">
                            <p class="text-[9px] text-gray-500 uppercase font-black">Kvota</p>
                            <p class="text-lg font-mono text-yellow-500">${startOdd.toFixed(2)}</p>
                        </div>
                    </div>
                    ${isFavoriteLosing ? '<div class="absolute top-0 right-0 bg-rose-600 text-[9px] px-3 py-1 drop-alert uppercase font-black tracking-tighter">FAVORIT GUBI!</div>' : ''}
                `;
                container.appendChild(card);
            });
        }

        // ... ostatak koda za zvuk i notifikacije ostaje isti ...
        document.getElementById('testSound').addEventListener('click', () => {
            const sfx = document.getElementById('alertSound');
            sfx.play();
        });

        refreshData();
        setInterval(refreshData, 240000);
    </script>
</body>
</html>
