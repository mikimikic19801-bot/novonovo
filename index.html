<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetKo Pro Monitor</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .drop-alert { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 pb-20">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-emerald-400">BetKo <span class="text-white text-sm font-light uppercase tracking-widest">Live Pro</span></h1>
        <button id="enableNotifications" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm transition">
            <i class="fas fa-bell mr-2"></i>Aktiviraj Monitor
        </button>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card p-4 rounded-2xl">
            <p class="text-gray-400 text-xs uppercase">Sledeći presek</p>
            <p id="nextReport" class="text-xl font-mono text-emerald-300">13:00h / 17:00h</p>
        </div>
        <div class="card p-4 rounded-2xl text-right">
            <p class="text-gray-400 text-xs uppercase">Aktivno mečeva</p>
            <p id="activeMatches" class="text-xl font-mono text-emerald-300">0</p>
        </div>
    </div>

    <div id="matchContainer" class="space-y-4">
        <div class="text-center py-20 text-gray-500">Učitavanje podataka sa API-ja...</div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 p-4 flex justify-around items-center">
        <button onclick="location.reload()" class="text-emerald-400 text-xl"><i class="fas fa-sync-alt"></i></button>
        <div class="text-xs text-gray-500 uppercase tracking-tighter italic">BetKo Dashboard v2.0</div>
        <button id="testSound" class="text-gray-400 text-xl"><i class="fas fa-volume-up"></i></button>
    </nav>

    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const API_FOOTBALL_KEY = '8464fe0b2c02cc648155fd7aaa8a5806';
        const ODDS_API_KEY = '78aa611b89f31e9ea7a5450ecb188205801b0be3e43a2a7ae72dc6cf6667da07';
        
        let initialOddsCache = JSON.parse(localStorage.getItem('initialOdds')) || {};

        async function init() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js');
            }
            requestNotificationPermission();
            await refreshData();
            setInterval(refreshData, 240000); // 4 minuta
            setInterval(checkScheduledReports, 60000); // Svaki minut provera vremena
        }

        async function refreshData() {
            try {
                // 1. Dobijanje live utakmica (API Football)
                const res = await fetch('https://v3.football.api-sports.io/fixtures?live=all', {
                    headers: { 'x-apisports-key': API_FOOTBALL_KEY }
                });
                const data = await res.json();
                renderMatches(data.response);
                document.getElementById('activeMatches').innerText = data.response.length;
            } catch (err) { console.error('API Error:', err); }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matchContainer');
            container.innerHTML = '';

            matches.forEach(m => {
                const fixtureId = m.fixture.id;
                const status = m.fixture.status.elapsed;
                const goalsHome = m.goals.home;
                const goalsAway = m.goals.away;
                
                // Uzimanje kvote iz cache-a (pretpostavka da je ranije sačuvana)
                const startOdd = initialOddsCache[fixtureId] || 'N/A';

                const card = document.createElement('div');
                card.className = 'card p-5 rounded-2xl relative overflow-hidden';
                
                // Logika za favorite (kvota < 1.75)
                let isFavoriteAlert = false;
                if(startOdd < 1.75 && startOdd !== 'N/A') {
                    if(goalsHome < goalsAway) isFavoriteAlert = true; // Ako favorit (domaćin) gubi
                }

                // Logika za 75. minut i nereseno
                const isDraw75 = (status >= 75 && goalsHome === goalsAway);

                if (isFavoriteAlert || isDraw75) {
                    playAlertSound();
                    sendNotification(`Uzbuna na meču: ${m.teams.home.name} - ${m.teams.away.name}`, `Status: ${status}' | Rezultat: ${goalsHome}:${goalsAway}`);
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-gray-400 font-mono">${m.league.name}</span>
                        <span class="text-emerald-400 font-bold text-sm">${status}'</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="flex-1">
                            <p class="text-lg ${goalsHome < goalsAway && startOdd < 1.75 ? 'text-rose-400' : ''}">${m.teams.home.name}</p>
                            <p class="text-lg">${m.teams.away.name}</p>
                        </div>
                        <div class="text-2xl font-black px-4">${goalsHome} : ${goalsAway}</div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-500 uppercase leading-none">Početna</p>
                            <p class="text-lg font-mono text-yellow-500">${startOdd}</p>
                        </div>
                    </div>
                    ${isFavoriteAlert ? '<div class="absolute top-0 right-0 bg-rose-600 text-[10px] px-2 py-1 drop-alert uppercase font-bold">Favorit gubi!</div>' : ''}
                `;
                container.appendChild(card);
            });
        }

        async function checkScheduledReports() {
            const now = new Date();
            const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            
            if (timeStr === "13:00" || timeStr === "17:00") {
                const drops = await fetchOddsDrops();
                if (drops.length > 0) {
                    playAlertSound();
                    sendNotification("Dnevni izveštaj kvota", `Pronađeno ${drops.length} utakmica sa padom preko 10%`);
                }
            }
        }

        async function fetchOddsDrops() {
            // Logika za poređenje kvota preko Odds API-ja
            const res = await fetch(`https://api.odds-api.io/v4/sports/soccer/odds/?apiKey=${ODDS_API_KEY}&regions=eu`);
            const data = await res.json();
            // Ovde ide kalkulacija % (pojednostavljeno za demo)
            return data.filter(d => d.drop > 10); 
        }

        function playAlertSound() {
            const sfx = document.getElementById('alertSound');
            sfx.currentTime = 0;
            sfx.play().catch(e => console.log("Sound blocked by browser"));
        }

        function requestNotificationPermission() {
            Notification.requestPermission();
        }

        function sendNotification(title, body) {
            if (Notification.permission === "granted") {
                new Notification(title, { body, icon: 'icon-192.png' });
            }
        }

        document.getElementById('enableNotifications').addEventListener('click', () => {
            requestNotificationPermission();
            playAlertSound();
            alert("Sistem za praćenje je aktiviran!");
        });

        document.getElementById('testSound').addEventListener('click', playAlertSound);

        init();
    </script>
</body>
</html>
